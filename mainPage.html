<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>i-Expense</title>
  <link rel="stylesheet" href="styles/mainPage.css">
</head>
<body>
  <div class="top-nav-container">
    <button class="menu-btn js-menu-btn">
      <img src="icons/burger-bar-white.png">
    </button>
  </div>

  <div class="main-container">
    <div class="main-header">
      <img src="icons/i-expense-logo-name.png">
    </div>
    <div class="form-container">
      <div class="login-active">
        <input type="text" placeholder="Email"    class="email-inp">
        <input type="password" placeholder="Password" class="pwd-inp">
        <div class="login-btn">
          <button>Log in</button>
          <span class="js-signup-btn">Sign up</span>
        </div>
      </div>
      <div class="signup-close">
        <div class="step1-close">
          <input type="text" placeholder="First Name">
          <input type="text" placeholder="Last Name (Optional)">
          <input type="text" placeholder="Email">
        </div>
        <div class="step2-close">
          <input type="password" placeholder="Password">
          <input type="password" placeholder="Complete Password">
          <div class="verification">
            <input type="number" placeholder="Enter verification code">
            <button>Send Code</button>
          </div>
        </div>
        <div class="signup-btn">
          <button class="js-previous-btn">
            <img src="icons/white-arrow-left.png">
          </button>
          <button class="js-next-btn">
            <img src="icons/white-arrow-right.png">
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="left-nav js-left-nav
    close-side-nav">
    <div class="left-nav-btn-container">
      <button class="home-btn">
        <span>
          Home
        </span>
      </button>
      <button class="about-us-btn">
        <span>
          About Us
        </span>
      </button>
      <button class="close-nav-btn
        js-close-nav-btn">
        <img src="icons/right-arrow.png">
      </button>
    </div>
  </div>

  <script type="module" src="script/homePage.js"></script>
</body>
</html>
